syntax = "proto3";

package hotelreservation;

message Point {
  string pid = 1;
  double plat = 2;
  double plon = 3;
  string padding1 = 4;  // 1000-byte random string for padding
  string padding2 = 5;  // 1000-byte random string for padding
  string padding3 = 6;  // 1000-byte random string for padding
  string padding4 = 7;  // 1000-byte random string for padding
  string padding5 = 8;  // 1000-byte random string for padding
  string padding6 = 9;  // 1000-byte random string for padding
  string padding7 = 10;  // 1000-byte random string for padding
  string padding8 = 11;  // 1000-byte random string for padding
}

message User {
  string username = 1;
  string password = 2;
  string padding1 = 3;  // 1000-byte random string for padding
  string padding2 = 4;  // 1000-byte random string for padding
  string padding3 = 5;  // 1000-byte random string for padding
  string padding4 = 6;  // 1000-byte random string for padding
