  string padding6 = 8;  // 1000-byte random string for padding
  string padding7 = 9;  // 1000-byte random string for padding
  string padding8 = 10;  // 1000-byte random string for padding
}

message RoomType {
  double bookable_rate = 1;
  string code = 2;
  string room_description = 3;
  double total_rate = 4;
  double total_rate_inclusive = 5;
  string padding1 = 6;  // 1000-byte random string for padding
  string padding2 = 7;  // 1000-byte random string for padding
  string padding3 = 8;  // 1000-byte random string for padding
  string padding4 = 9;  // 1000-byte random string for padding
  string padding5 = 10;  // 1000-byte random string for padding
  string padding6 = 11;  // 1000-byte random string for padding
  string padding7 = 12;  // 1000-byte random string for padding
  string padding8 = 13;  // 1000-byte random string for padding
}

message RatePlan {
  string hotel_id = 1;
  string code = 2;
  string in_date = 3;
  string out_date = 4;
  RoomType room_type = 5;
  string padding1 = 6;  // 1000-byte random string for padding
  string padding2 = 7;  // 1000-byte random string for padding
  string padding3 = 8;  // 1000-byte random string for padding
  string padding4 = 9;  // 1000-byte random string for padding
  string padding5 = 10;  // 1000-byte random string for padding
  string padding6 = 11;  // 1000-byte random string for padding
  string padding7 = 12;  // 1000-byte random string for padding
  string padding8 = 13;  // 1000-byte random string for padding
}

message Reservation {
  string hotel_id = 1;
  string customer_name = 2;
  string in_date = 3;
  string out_date = 4;
  int64 number = 5;
  string padding1 = 6;  // 1000-byte random string for padding
  string padding2 = 7;  // 1000-byte random string for padding
  string padding3 = 8;  // 1000-byte random string for padding
  string padding4 = 9;  // 1000-byte random string for padding
  string padding5 = 10;  // 1000-byte random string for padding
  string padding6 = 11;  // 1000-byte random string for padding
  string padding7 = 12;  // 1000-byte random string for padding
  string padding8 = 13;  // 1000-byte random string for padding
}

