  string padding6 = 11;  // 1000-byte random string for padding
  string padding7 = 12;  // 1000-byte random string for padding
  string padding8 = 13;  // 1000-byte random string for padding
}

message Address {
  string street_number = 1;
  string street_name = 2;
  string city = 3;
  string state = 4;
  string country = 5;
  string postal_code = 6;
  double lat = 7;
  double lon = 8;
  string padding1 = 9;  // 1000-byte random string for padding
  string padding2 = 10;  // 1000-byte random string for padding
  string padding3 = 11;  // 1000-byte random string for padding
  string padding4 = 12;  // 1000-byte random string for padding
  string padding5 = 13;  // 1000-byte random string for padding
  string padding6 = 14;  // 1000-byte random string for padding
  string padding7 = 15;  // 1000-byte random string for padding
  string padding8 = 16;  // 1000-byte random string for padding
}

message HotelProfile {
  string id = 1;
  string name = 2;
  string phone_number = 3;
  string description = 4;
